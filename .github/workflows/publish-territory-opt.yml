name: Publish b2b-territory-optimization to PyPI

on:
  workflow_dispatch:  # Allows you to trigger this manually from the GitHub Actions tab

jobs:
  build-and-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    
    # REQUIRED for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build a binary wheel and a source tarball
        run: python -m build
        working-directory: b2b_territory_optimization

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: b2b_territory_optimization/dist/
